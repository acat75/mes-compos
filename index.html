<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Compos · Alice</title>
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b0c2a, #1c1f4a 40%, #3a2c5b 70%, #5c3d70);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
      overflow-x: hidden;
      position: relative;
    }

    /* conteneur principal avec flou + transparence (flou réduit) */
    .glass-wrapper {
      width: 100%;
      max-width: 1000px;
      backdrop-filter: blur(6px) brightness(0.88);
      -webkit-backdrop-filter: blur(6px) brightness(0.88);
      background: rgba(20, 15, 35, 0.30);
      border-radius: 56px;
      padding: 30px 25px 40px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: filter 0.5s ease;
      position: relative;
      z-index: 2;
      pointer-events: auto;
    }

    /* Titre principal */
    .hero-title {
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #f9e3b2, #ffb6d9, #c9b1ff, #a3d0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 150, 200, 0.3), 0 8px 20px rgba(0, 0, 0, 0.5);
      font-family: 'Georgia', 'Times New Roman', serif;
      transform: scaleY(1.02);
      position: relative;
      display: inline-block;
      width: 100%;
      padding-bottom: 8px;
    }
    .hero-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ffb3d9, #b7a2ff, transparent);
      border-radius: 100%;
      filter: blur(2px);
    }

    /* Grille des catégories (4 cartes cliquables) */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .category-card {
      background: rgba(10, 8, 25, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 22px 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s ease, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      text-align: center;
      user-select: none;
    }
    .category-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      border-color: rgba(255, 200, 230, 0.25);
    }
    .category-card.active {
      border-color: #ff7eb3;
      box-shadow: 0 0 30px rgba(255, 120, 180, 0.2);
    }

    .category-icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 6px;
    }
    .category-name {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #f0e9ff;
      text-shadow: 0 0 20px rgba(200, 160, 255, 0.15);
    }

    /* Conteneur des pistes (affiché quand la catégorie est ouverte) */
    .tracks-container {
      margin-top: 28px;
      display: none;
      animation: fadeSlide 0.35s ease forwards;
    }
    .tracks-container.open {
      display: block;
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .track-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 14px 14px 12px;
      border-left: 3px solid rgba(255, 180, 200, 0.3);
      transition: background 0.2s;
    }
    .track-item:hover {
      background: rgba(40, 30, 70, 0.5);
    }

    .track-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #f5e9ff;
    }

    audio {
      width: 100%;
      height: 34px;
      border-radius: 40px;
      display: block;
      margin: 4px 0 6px;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }
    audio::-webkit-media-controls-panel {
      background: rgba(20, 15, 40, 0.7);
    }
    audio::-webkit-media-controls-download-button,
    audio::-internal-media-controls-download-button {
      display: none !important;
    }
    audio::-webkit-media-controls-enclosure {
      overflow: hidden;
    }

    .download-btn {
      background: linear-gradient(145deg, #ff7eb3, #b47aff);
      border: none;
      color: white;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(180, 100, 255, 0.25);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .download-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(200, 120, 255, 0.4);
    }

    /* Notes flottantes */
    .floating-notes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .note-float {
      position: absolute;
      font-size: 3.2rem;
      font-family: 'Bravura', 'Arial Unicode MS', 'Segoe UI', sans-serif;
      opacity: 0;
      animation: floatNote 12s infinite ease-in-out;
      text-shadow: 0 0 25px currentColor, 0 0 60px currentColor;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.3));
      will-change: transform, opacity;
    }
    .note-float:nth-child(1) { left: 5%; top: 12%; animation-delay: 0s; color: #ff98c1; font-size: 4rem; }
    .note-float:nth-child(2) { left: 18%; top: 75%; animation-delay: 1.8s; color: #b7a2ff; font-size: 3.8rem; transform: rotate(-6deg); }
    .note-float:nth-child(3) { left: 78%; top: 8%; animation-delay: 0.9s; color: #7fc9ff; font-size: 5rem; }
    .note-float:nth-child(4) { left: 92%; top: 60%; animation-delay: 3.2s; color: #f8b88b; font-size: 3.4rem; }
    .note-float:nth-child(5) { left: 45%; top: 90%; animation-delay: 4.5s; color: #a5f0c0; font-size: 4.6rem; }
    .note-float:nth-child(6) { left: 60%; top: 20%; animation-delay: 6s; color: #ffb3d9; font-size: 3rem; }
    .note-float:nth-child(7) { left: 30%; top: 40%; animation-delay: 2.5s; color: #d6b0ff; font-size: 4.2rem; }
    .note-float:nth-child(8) { left: 85%; top: 82%; animation-delay: 7.1s; color: #ffb07c; font-size: 3.6rem; }
    .note-float:nth-child(9) { left: 10%; top: 50%; animation-delay: 5.3s; color: #8fcbff; font-size: 4.8rem; }
    .note-float:nth-child(10) { left: 70%; top: 45%; animation-delay: 8.4s; color: #ff8aae; font-size: 3.2rem; }
    .note-float:nth-child(11) { left: 50%; top: 10%; animation-delay: 10s; color: #c0a0ff; font-size: 5.2rem; }
    .note-float:nth-child(12) { left: 3%; top: 92%; animation-delay: 3.8s; color: #a3e0c0; font-size: 3.9rem; }
    .note-float:nth-child(13) { left: 95%; top: 25%; animation-delay: 11.2s; color: #f7b0d0; font-size: 4.4rem; }
    .note-float:nth-child(14) { left: 40%; top: 65%; animation-delay: 6.7s; color: #beb0ff; font-size: 3rem; }
    .note-float:nth-child(15) { left: 22%; top: 22%; animation-delay: 9.5s; color: #ffbe8a; font-size: 4rem; }

    @keyframes floatNote {
      0% { opacity: 0; transform: translateY(20px) rotate(0deg) scale(0.7); }
      12% { opacity: 0.9; transform: translateY(-10px) rotate(12deg) scale(1); }
      30% { opacity: 1; transform: translateY(-40px) rotate(-8deg) scale(1.1); }
      60% { opacity: 0.8; transform: translateY(-90px) rotate(15deg) scale(1.05); }
      85% { opacity: 0.4; transform: translateY(-130px) rotate(-6deg) scale(0.9); }
      100% { opacity: 0; transform: translateY(-180px) rotate(20deg) scale(0.6); }
    }

    /* Overlays mot de passe */
    .password-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
    }
    .password-box {
      position: relative;
      background: rgba(20, 15, 40, 0.7);
      backdrop-filter: blur(8px);
      padding: 40px 50px 35px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
      text-align: center;
      max-width: 420px;
      width: 90%;
      overflow: visible;
    }

    /* Smileys aux 4 coins - agrandis, plus éparpillés et inclinés */
    .corner-symbol {
      position: absolute;
      font-size: 3.4rem;
      opacity: 0.55;
      filter: drop-shadow(0 0 18px rgba(255,200,230,0.15));
      pointer-events: none;
      transition: transform 0.3s;
    }
    .corner-symbol.tl {
      top: -32px;
      left: -28px;
      transform: rotate(-22deg) scale(1.1);
    }
    .corner-symbol.tr {
      top: -30px;
      right: -32px;
      transform: rotate(28deg) scale(1.2);
    }
    .corner-symbol.bl {
      bottom: -34px;
      left: -26px;
      transform: rotate(18deg) scale(1.15);
    }
    .corner-symbol.br {
      bottom: -28px;
      right: -30px;
      transform: rotate(-20deg) scale(1.25);
    }

    .lock-icon {
      font-size: 3.6rem;
      margin-bottom: 6px;
      animation: lockPulse 2s infinite;
    }
    @keyframes lockPulse {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.08) rotate(2deg); }
    }

    .password-label {
      font-size: 1.1rem;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.7);
    }

    .password-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .password-input {
      padding: 12px 18px;
      border-radius: 60px;
      border: none;
      width: 70%;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      outline: 1px solid rgba(255, 255, 255, 0.15);
      letter-spacing: 3px;
      font-weight: 300;
      text-align: center;
    }
    .password-input::placeholder {
      color: rgba(255,255,255,0.25);
      font-size: 1.1rem;
      letter-spacing: 6px;
    }
    .password-input:focus {
      outline: 1px solid rgba(255, 180, 200, 0.4);
    }

    .password-btn {
      background: linear-gradient(145deg, #ff7eb3, #a67aff);
      border: none;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 20px rgba(180, 100, 255, 0.3);
    }
    .password-btn:hover { transform: scale(1.03); }
    .error-msg { color: #ff7a9e; margin-top: 12px; display: none; }

    .download-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      color: white;
    }

    .copyright {
      position: fixed;
      bottom: 18px;
      left: 24px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1.5px;
      z-index: 10;
      font-weight: 300;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    @media (max-width: 700px) {
      .hero-title { font-size: 2.8rem; letter-spacing: 3px; }
      .category-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .glass-wrapper { padding: 20px 12px; border-radius: 32px; }
      .note-float { font-size: 2.2rem !important; }
      .password-box { padding: 30px 20px; }
      .corner-symbol { font-size: 2.6rem; }
      .corner-symbol.tl { top: -22px; left: -18px; }
      .corner-symbol.tr { top: -22px; right: -20px; }
      .corner-symbol.bl { bottom: -24px; left: -16px; }
      .corner-symbol.br { bottom: -20px; right: -18px; }
      .copyright { left: 16px; bottom: 12px; font-size: 0.55rem; }
      .tracks-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 450px) {
      .category-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .category-card { padding: 14px 10px; }
      .category-icon { font-size: 2rem; }
      .category-name { font-size: 1rem; }
      .password-input { width: 60%; font-size: 0.9rem; }
      .corner-symbol { font-size: 2.2rem; }
      .corner-symbol.tl { top: -16px; left: -12px; }
      .corner-symbol.tr { top: -16px; right: -14px; }
      .corner-symbol.bl { bottom: -18px; left: -10px; }
      .corner-symbol.br { bottom: -14px; right: -12px; }
    }
  </style>
</head>
<body>

  <!-- NOTES FLOTTANTES -->
  <div class="floating-notes">
    <div class="note-float">♪</div><div class="note-float">♫</div><div class="note-float">♩</div>
    <div class="note-float">♬</div><div class="note-float">♭</div><div class="note-float">♮</div>
    <div class="note-float">♯</div><div class="note-float">♪</div><div class="note-float">♫</div>
    <div class="note-float">♩</div><div class="note-float">♬</div><div class="note-float">♭</div>
    <div class="note-float">♪</div><div class="note-float">♫</div><div class="note-float">♩</div>
  </div>

  <!-- CRÉDIT -->
  <div class="copyright">© Alice, Tous droits réservés</div>

  <!-- CONTENU PRINCIPAL -->
  <div class="glass-wrapper" id="mainContent">
    <div style="text-align: center;">
      <h1 class="hero-title">Mes Compos</h1>
    </div>

    <!-- 4 CATÉGORIES CLIQUABLES (sans badges) -->
    <div class="category-grid" id="categoryGrid">
      <div class="category-card" data-category="piano">
        <span class="category-icon">🎹</span>
        <div class="category-name">Piano</div>
      </div>
      <div class="category-card" data-category="mpc">
        <span class="category-icon">🎛️</span>
        <div class="category-name">MPC Beats</div>
      </div>
      <div class="category-card" data-category="guitare">
        <span class="category-icon">🪕</span>
        <div class="category-name">Guitare</div>
      </div>
      <div class="category-card" data-category="covers">
        <span class="category-icon">♫</span>
        <div class="category-name">Covers</div>
      </div>
    </div>

    <!-- CONTENEUR DYNAMIQUE POUR LES PISTES -->
    <div class="tracks-container" id="tracksContainer">
      <div class="tracks-grid" id="tracksGrid"></div>
    </div>
  </div>

  <!-- OVERLAY MOT DE PASSE (premier niveau) -->
  <div class="password-overlay" id="passwordOverlay">
    <div class="password-box">
      <!-- Smileys aux 4 coins - agrandis, plus éparpillés et inclinés -->
      <span class="corner-symbol tl">🎹</span>
      <span class="corner-symbol tr">🪕</span>
      <span class="corner-symbol bl">🎛️</span>
      <span class="corner-symbol br">♫</span>

      <div class="lock-icon">🔒</div>
      <div class="password-label">Code accès :</div>
      <div class="password-input-wrapper">
        <input type="password" id="pagePassword" class="password-input" placeholder="• • • • • • • • • •" maxlength="20">
        <button class="password-btn" onclick="checkPagePassword()">Valider</button>
      </div>
      <div id="pageError" class="error-msg">⛔ Code incorrect</div>
    </div>
  </div>

  <!-- OVERLAY TÉLÉCHARGEMENT (second niveau) -->
  <div class="download-overlay" id="downloadOverlay">
    <div class="password-box" style="background: rgba(10, 6, 25, 0.85);">
      <span class="corner-symbol tl">🎹</span>
      <span class="corner-symbol tr">🪕</span>
      <span class="corner-symbol bl">🎛️</span>
      <span class="corner-symbol br">♫</span>
      <div class="lock-icon">🔒</div>
      <div class="password-label">Code de téléchargement</div>
      <div class="password-input-wrapper">
        <input type="password" id="downloadPassInput" class="password-input" placeholder="• • • • • • • • • •" maxlength="20">
        <button class="password-btn" onclick="verifyDownloadPass()">Valider</button>
        <button class="password-btn" style="background: #555;" onclick="cancelDownload()">Annuler</button>
      </div>
      <div id="downloadError" class="error-msg">⛔ Code incorrect</div>
    </div>
  </div>

  <script>
    // ---------- DONNÉES DES PISTES PAR CATÉGORIE ----------
    const tracksData = {
      piano: [
        { title: 'Tourments', file: 'compo3.mp3' },
        { title: 'Étincelle', file: 'compo2.mp3' },
        { title: 'Je t\'oublierai', file: 'compo1.mp3' },
        { title: 'Envol', file: 'compo4.mp3' },
        { title: 'Ophélie', file: 'compo9.mp3' },
        { title: 'À minuit...', file: 'compo6.mp3' },
        { title: 'Indépendance', file: 'compo7.mp3' },
        { title: 'Moments éphémères', file: 'compo8.mp3' },
        { title: 'Le Reveston', file: 'compo5.mp3' },
        { title: 'Dans le train...', file: 'compo10.mp3' },
        { title: 'La Prisonnière', file: 'compo11.mp3' }
      ],
      mpc: [
        { title: 'Évasion', file: 'Évasion.wav' },
        { title: 'Mon auberge était à la Grande-Ours', file: 'Mon auberge était à la Grande-Ours.wav' },
        { title: 'L\'appel de l\'été', file: 'L\'appel de l\'été.wav' },
        { title: 'Midnight', file: 'Midnight.wav' },
        { title: 'Un zeste de liberté', file: 'Un zeste de liberté.wav' }
      ],
      guitare: [
        { title: 'À minuit... (guitare)', file: 'À minuit....mp3' }
      ],
      covers: [
        { title: 'Numb · Linkin Park', file: 'Numb - Linkin Park.mp3' },
        { title: 'Wonderwall · Oasis', file: 'Wonderwall - Oasis.mp3' }
      ]
    };

    // État : catégorie active
    let activeCategory = null;

    // Éléments DOM
    const categoryCards = document.querySelectorAll('.category-card');
    const tracksContainer = document.getElementById('tracksContainer');
    const tracksGrid = document.getElementById('tracksGrid');

    // Fonction pour afficher les pistes d'une catégorie
    function renderCategory(categoryKey) {
      const tracks = tracksData[categoryKey];
      if (!tracks) return;

      activeCategory = categoryKey;

      // Mettre à jour l'état actif des cartes
      categoryCards.forEach(card => {
        card.classList.toggle('active', card.dataset.category === categoryKey);
      });

      // Générer le HTML des pistes
      let html = '';
      tracks.forEach(track => {
        const safeTitle = track.title.replace(/'/g, "\\'");
        html += `
          <div class="track-item">
            <div class="track-title">${track.title}</div>
            <audio controls controlsList="nodownload" src="${track.file}"></audio>
            <button class="download-btn" onclick="promptDownload('${track.file}', '${safeTitle}')">📥 Télécharger</button>
          </div>
        `;
      });

      tracksGrid.innerHTML = html;
      tracksContainer.classList.add('open');

      // Désactiver le clic droit sur les audios
      document.querySelectorAll('#tracksGrid audio').forEach(a => {
        a.addEventListener('contextmenu', e => e.preventDefault());
        a.addEventListener('dragstart', e => e.preventDefault());
        a.addEventListener('selectstart', e => e.preventDefault());
      });
    }

    // Gérer le clic sur une catégorie
    categoryCards.forEach(card => {
      card.addEventListener('click', function() {
        const category = this.dataset.category;
        if (activeCategory === category && tracksContainer.classList.contains('open')) {
          tracksContainer.classList.remove('open');
          this.classList.remove('active');
          activeCategory = null;
          return;
        }
        renderCategory(category);
      });
    });

    // ---------- MOTS DE PASSE ----------
    const PAGE_PASSWORD = "Louise 64!";
    const DOWNLOAD_PASSWORD = "Youyou 64!";
    let fileToDl = "", titleToDl = "";

    function checkPagePassword() {
      const input = document.getElementById('pagePassword').value;
      if (input === PAGE_PASSWORD) {
        document.getElementById('passwordOverlay').style.display = 'none';
        document.getElementById('mainContent').style.filter = 'none';
        document.getElementById('mainContent').style.pointerEvents = 'auto';
      } else {
        document.getElementById('pageError').style.display = 'block';
      }
    }

    function promptDownload(filename, title) {
      fileToDl = filename;
      titleToDl = title;
      document.getElementById('downloadPassInput').value = '';
      document.getElementById('downloadError').style.display = 'none';
      document.getElementById('downloadOverlay').style.display = 'flex';
    }

    function verifyDownloadPass() {
      const input = document.getElementById('downloadPassInput').value;
      if (input === DOWNLOAD_PASSWORD) {
        const link = document.createElement('a');
        link.href = fileToDl;
        link.download = fileToDl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        document.getElementById('downloadOverlay').style.display = 'none';
        alert(`✅ Téléchargement de "${titleToDl}" autorisé !`);
        fileToDl = ""; titleToDl = "";
      } else {
        document.getElementById('downloadError').style.display = 'block';
      }
    }

    function cancelDownload() {
      document.getElementById('downloadOverlay').style.display = 'none';
      fileToDl = ""; titleToDl = "";
    }

    // Entrée : validation rapide
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        if (document.getElementById('downloadOverlay').style.display === 'flex') {
          verifyDownloadPass();
        } else if (document.getElementById('passwordOverlay').style.display !== 'none') {
          checkPagePassword();
        }
      }
    });

    // Bloquer Ctrl+S
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        return false;
      }
    });

    // Au chargement : contenu flou (réduit)
    window.onload = function() {
      document.getElementById('mainContent').style.filter = 'blur(4px)';
      document.getElementById('mainContent').style.pointerEvents = 'none';
    };
  </script>
</body>
</html>
